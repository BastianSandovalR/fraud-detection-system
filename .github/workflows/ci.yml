name: MLOps Continuous Integration

# 1. ¿Cuándo se despierta el robot?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. ¿Qué trabajo va a realizar?
jobs:
  build-and-test:
    # Levanta una máquina virtual con la última versión de Ubuntu (Linux)
    runs-on: ubuntu-latest

    steps:
    # Paso A: Descargar tu código desde el repositorio
    - name: 📥 Checkout del código
      uses: actions/checkout@v4

    # Paso B: Instalar Python en esa máquina vacía
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Paso C: Leer tu receta e instalar librerías
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Paso D: Analizar el código en busca de errores graves de sintaxis
    - name: 🕵️ Verificar sintaxis (Linting)
      run: |
        pip install flake8
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    # Paso E: Probar que la imagen de Docker de tu API se construya sin errores
    - name: 🐳 Construir Imagen Docker de la API
      run: |
        docker build -t fraud-api:test .
